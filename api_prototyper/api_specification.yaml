openapi: 3.0.3
info:
  title: Inventory Management API
  description: API for managing e-commerce product inventory, stock levels, and categories.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      required:
        - name
        - price
        - stock_quantity
      properties:
        id:
          type: string
          example: "PROD-1234"
        name:
          type: string
          minLength: 3
          example: "Wireless Mouse"
        price:
          type: number
          format: float
          minimum: 0.01
          example: 25.99
        stock_quantity:
          type: integer
          minimum: 0
          example: 150
        category:
          type: string
          example: "Electronics"
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

paths:
  /products:
    get:
      summary: List all products
      description: Returns a list of products with pagination.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Successful response
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized access
  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
        '404':
          description: Product not found
    put:
      summary: Update a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Updated
        '401':
          description: Unauthorized
        '404':
          description: Product not found
    delete:
      summary: Delete a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '404':
          description: Product not found
